name: Clean up recently started inspector instances
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
jobs:
  cleanup:
    runs-on: ubuntu-latest
#    runs-on: self-hosted
    strategy:
      matrix:
        vendor: [aws, azure, gcp, hcloud, upcloud, ovh, alicloud, vultr]
      fail-fast: false
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.vendor }}
    env:
      TRACKER_PROJECT_NAME: inspector
      TRACKER_ORCHESTRATOR: github-actions
      TRACKER_ENV: ci
      TRACKER_QUIET: "true"
      TRACKER_EXTERNAL_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      TRACKER_STAGE_NAME: ${{ github.workflow }}
      TRACKER_CONTAINER_IMAGE: ghcr.io/sparecores/sc-inspector:main
      TRACKER_LANGUAGE: python
      TRACKER_JOB_NAME: cleanup-${{ matrix.vendor }}
      TRACKER_TASK_NAME: cleanup
    container:
      image: ghcr.io/sparecores/sc-inspector:main
      env:
        GITHUB_TOKEN: ${{ github.token }}
        PULUMI_BACKEND_URL: ${{ secrets.PULUMI_BACKEND_URL }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        GOOGLE_PROJECT: ${{ secrets.GOOGLE_PROJECT }}
        ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
        ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        VULTR_API_KEY: ${{ secrets.VULTR_API_KEY }}
        OVH_CLOUD_PROJECT_SERVICE: ${{ secrets.OVH_CLOUD_PROJECT_SERVICE }}
        OVH_CLIENT_ID: ${{ secrets.OVH_CLIENT_ID }}
        OVH_CLIENT_SECRET: ${{ secrets.OVH_CLIENT_SECRET }}
        OVH_ENDPOINT: ${{ vars.OVH_ENDPOINT }}
        UPCLOUD_USERNAME: ${{ secrets.UPCLOUD_USERNAME }}
        UPCLOUD_PASSWORD: ${{ secrets.UPCLOUD_PASSWORD }}
        ALICLOUD_SHARED_VPC_NAME_PREFIX: ${{ vars.ALICLOUD_SHARED_VPC_NAME_PREFIX }}
        INSPECTOR_RUNS_BUCKET: ${{ vars.INSPECTOR_RUNS_BUCKET }}
        INSPECTOR_RUNS_REGION: ${{ vars.INSPECTOR_RUNS_REGION }}
        REPO_PATH: /repo/sc-inspector-data
      volumes:
        - ${{ github.workspace }}/sc-inspector-data:/repo/sc-inspector-data
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          path: sc-inspector-data
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.SC_RUNNER_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          # 12 hours (maximum allowed by AWS) to avoid expiring tokens during long-running cleanup
          role-duration-seconds: 43200
          aws-region: us-east-1
      - name: Get Alibaba Cloud credentials
        id: alibaba-cloud-credentials
        uses: 'mozillazg/alibabacloud-oidc-auth@v1.3.0'
        with:
          role-arn-to-assume: '${{ secrets.ALIBABA_CLOUD_RAM_ROLE_ARN }}'
          oidc-provider-arn: '${{ secrets.ALIBABA_CLOUD_RAM_OIDC_ARN }}'
          export-environment-variables: 'true'
          region: 'us-west-1'
      - name: Set up resource-tracker
        run: bash /repo/sc-inspector-data/.github/scripts/setup-resource-tracker.sh
      - name: inspector
        run: bash /repo/sc-inspector-data/.github/scripts/run-with-resource-tracker.sh python /inspector/inspector.py cleanup --vendor ${{ matrix.vendor }}
  cleanup-dbaas-azure:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-cleanup-dbaas-azure
    env:
      TRACKER_PROJECT_NAME: inspector
      TRACKER_ORCHESTRATOR: github-actions
      TRACKER_ENV: ci
      TRACKER_QUIET: "true"
      TRACKER_EXTERNAL_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      TRACKER_STAGE_NAME: ${{ github.workflow }}
      TRACKER_CONTAINER_IMAGE: ghcr.io/sparecores/sc-inspector:main
      TRACKER_LANGUAGE: python
      TRACKER_JOB_NAME: cleanup-dbaas-azure
      TRACKER_TASK_NAME: cleanup-dbaas
    container:
      image: ghcr.io/sparecores/sc-inspector:main
      env:
        GITHUB_TOKEN: ${{ github.token }}
        PULUMI_BACKEND_URL: ${{ secrets.PULUMI_BACKEND_URL }}
        ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
        ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        INSPECTOR_RUNS_BUCKET: ${{ vars.INSPECTOR_RUNS_BUCKET }}
        INSPECTOR_RUNS_REGION: ${{ vars.INSPECTOR_RUNS_REGION }}
        REPO_PATH: /repo/sc-inspector-data
      volumes:
        - ${{ github.workspace }}/sc-inspector-data:/repo/sc-inspector-data
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          path: sc-inspector-data
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.SC_RUNNER_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          role-duration-seconds: 43200
          aws-region: us-east-1
      - name: Set up resource-tracker
        run: bash /repo/sc-inspector-data/.github/scripts/setup-resource-tracker.sh
      - name: inspector cleanup-dbaas
        run: bash /repo/sc-inspector-data/.github/scripts/run-with-resource-tracker.sh python /inspector/inspector.py cleanup-dbaas --vendor azure
  cleanup-dbaas-gcp:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-cleanup-dbaas-gcp
    env:
      TRACKER_PROJECT_NAME: inspector
      TRACKER_ORCHESTRATOR: github-actions
      TRACKER_ENV: ci
      TRACKER_QUIET: "true"
      TRACKER_EXTERNAL_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      TRACKER_STAGE_NAME: ${{ github.workflow }}
      TRACKER_CONTAINER_IMAGE: ghcr.io/sparecores/sc-inspector:main
      TRACKER_LANGUAGE: python
      TRACKER_JOB_NAME: cleanup-dbaas-gcp
      TRACKER_TASK_NAME: cleanup-dbaas
    container:
      image: ghcr.io/sparecores/sc-inspector:main
      env:
        GITHUB_TOKEN: ${{ github.token }}
        PULUMI_BACKEND_URL: ${{ secrets.PULUMI_BACKEND_URL }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        GOOGLE_PROJECT: ${{ secrets.GOOGLE_PROJECT }}
        INSPECTOR_RUNS_BUCKET: ${{ vars.INSPECTOR_RUNS_BUCKET }}
        INSPECTOR_RUNS_REGION: ${{ vars.INSPECTOR_RUNS_REGION }}
        REPO_PATH: /repo/sc-inspector-data
      volumes:
        - ${{ github.workspace }}/sc-inspector-data:/repo/sc-inspector-data
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          path: sc-inspector-data
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.SC_RUNNER_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          role-duration-seconds: 43200
          aws-region: us-east-1
      - name: Set up resource-tracker
        run: bash /repo/sc-inspector-data/.github/scripts/setup-resource-tracker.sh
      - name: inspector cleanup-dbaas
        run: bash /repo/sc-inspector-data/.github/scripts/run-with-resource-tracker.sh python /inspector/inspector.py cleanup-dbaas --vendor gcp

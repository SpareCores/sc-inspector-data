name: Start instances for collecting data
on:
  schedule:
    - cron: "*/15 * * * *"
#    - cron: "13 * * * *"
  workflow_dispatch:
    inputs:
      vendor:
        description: Vendor to start (all = every vendor not on the skiplist; must be specific when instance is set)
        required: true
        default: all
        type: choice
        options:
          - all
          - aws
          - gcp
          - azure
          - alicloud
          - hcloud
          - upcloud
          - vultr
          - ovh
      instance:
        description: Instance api_reference to start (optional; if set, only this instance is started)
        required: false
        type: string
        default: ""
permissions:
  contents: write
  id-token: write
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      vendors: ${{ steps.matrix.outputs.vendors }}
    steps:
      - id: matrix
        run: |
          # Vendor matrix (keep in sync with workflow_dispatch options except "all"):
          #   aws,      # ran out of credits
          #   gcp,
          #   azure,    # we have no quota for new instances  → skiplist
          #   alicloud,
          #   hcloud,
          #   upcloud,
          #   vultr,
          #   ovh       # ran out of credits                 → skiplist
          all_vendors='["aws","gcp","azure","alicloud","hcloud","upcloud","vultr","ovh"]'
          # Skiplist for schedule and manual "all". A manual run for a specific vendor ignores this.
          skiplist='["aws","ovh","vultr","alicloud"]'
          if [ -n "${{ inputs.instance }}" ]; then
            if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
              echo "::error::instance input is only valid for workflow_dispatch" >&2
              exit 1
            fi
            if [ "${{ inputs.vendor }}" = "all" ]; then
              echo "::error::When instance is set, vendor must be a specific vendor, not \"all\"" >&2
              exit 1
            fi
            echo "vendors=[\"${{ inputs.vendor }}\"]" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.vendor }}" != "all" ]; then
            echo "vendors=[\"${{ inputs.vendor }}\"]" >> "$GITHUB_OUTPUT"
          else
            vendors="$(python3 -c "import json; all_v=json.loads('${all_vendors}'); skip=set(json.loads('${skiplist}')); print(json.dumps([v for v in all_v if v not in skip]))")"
            echo "vendors=$vendors" >> "$GITHUB_OUTPUT"
          fi
  start-instances:
    needs: setup
    runs-on: ubuntu-latest
#    runs-on: self-hosted
    strategy:
      matrix:
        vendor: ${{ fromJson(needs.setup.outputs.vendors) }}
      fail-fast: false
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.vendor }}
    env:
      TRACKER_PROJECT_NAME: inspector
      TRACKER_ORCHESTRATOR: github-actions
      TRACKER_ENV: ci
      TRACKER_QUIET: "true"
      TRACKER_EXTERNAL_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      TRACKER_STAGE_NAME: ${{ github.workflow }}
      TRACKER_CONTAINER_IMAGE: ghcr.io/sparecores/sc-inspector:main
      TRACKER_LANGUAGE: python
      TRACKER_JOB_NAME: start-${{ matrix.vendor }}
      TRACKER_TASK_NAME: start
    container:
      image: ghcr.io/sparecores/sc-inspector:main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PULUMI_BACKEND_URL: ${{ secrets.PULUMI_BACKEND_URL }}
        BENCHMARK_SECRETS_PASSPHRASE: ${{ secrets.BENCHMARK_SECRETS_PASSPHRASE }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        GOOGLE_PROJECT: ${{ secrets.GOOGLE_PROJECT }}
        ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
        ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        OVH_CLOUD_PROJECT_SERVICE: ${{ secrets.OVH_CLOUD_PROJECT_SERVICE }}
        OVH_CLIENT_ID: ${{ secrets.OVH_CLIENT_ID }}
        OVH_CLIENT_SECRET: ${{ secrets.OVH_CLIENT_SECRET }}
        OVH_ENDPOINT: ${{ vars.OVH_ENDPOINT }}
        UPCLOUD_USERNAME: ${{ secrets.UPCLOUD_USERNAME }}
        UPCLOUD_PASSWORD: ${{ secrets.UPCLOUD_PASSWORD }}
        HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        VULTR_API_KEY: ${{ secrets.VULTR_API_KEY }}
        ALIBABA_CLOUD_RAM_OIDC_ARN: ${{ vars.ALIBABA_CLOUD_RAM_OIDC_ARN }}
        ALICLOUD_SHARED_VPC_NAME_PREFIX: ${{ vars.ALICLOUD_SHARED_VPC_NAME_PREFIX }}
        INSPECTOR_RUNS_BUCKET: ${{ vars.INSPECTOR_RUNS_BUCKET }}
        INSPECTOR_RUNS_REGION: ${{ vars.INSPECTOR_RUNS_REGION }}
        REPO_PATH: /repo/sc-inspector-data
      volumes:
        - ${{ github.workspace }}/sc-inspector-data:/repo/sc-inspector-data
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          path: sc-inspector-data
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.SC_RUNNER_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          # 12 hours (maximum allowed by AWS) to avoid expiring tokens during long-running operations
          role-duration-seconds: 43200
          aws-region: us-east-1
      - name: Install AWS CLI
        run: |
          apt-get update -y
          apt-get install -y unzip
          curl "https://awscli.amazonaws.com/awscli-exe-linux-$(uname -m).zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          ./aws/install
          rm -rf aws awscliv2.zip
      - name: Get Alibaba Cloud credentials
        id: alibaba-cloud-credentials
        uses: 'mozillazg/alibabacloud-oidc-auth@v1.3.0'
        with:
          role-arn-to-assume: '${{ secrets.ALIBABA_CLOUD_RAM_ROLE_ARN }}'
          oidc-provider-arn: '${{ secrets.ALIBABA_CLOUD_RAM_OIDC_ARN }}'
          export-environment-variables: 'true'
          region: 'us-west-1'
      - name: Set up resource-tracker
        run: bash /repo/sc-inspector-data/.github/scripts/setup-resource-tracker.sh
      - name: inspector
        run: |
          if [ -n "${{ inputs.instance }}" ]; then
            bash /repo/sc-inspector-data/.github/scripts/run-with-resource-tracker.sh \
              python /inspector/inspector.py start --vendor "${{ matrix.vendor }}" \
              --start-only "${{ matrix.vendor }}" "${{ inputs.instance }}"
          else
            bash /repo/sc-inspector-data/.github/scripts/run-with-resource-tracker.sh \
              python /inspector/inspector.py start --vendor "${{ matrix.vendor }}"
          fi
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
